<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — Nomadic Alchemy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a96e;
            --dark: #1c1914;
            --cream: #f2ece2;
            --text-light: #f5f0e8;
            --text-dark: #1a1a1a;
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Jost', 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--sans);
            background-color: var(--cream);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            width: 90%;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(201, 169, 110, 0.15);
            backdrop-filter: blur(5px);
        }

        .logo {
            font-family: var(--serif);
            font-size: 24px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .logo span {
            color: var(--gold);
            font-style: italic;
        }

        h1 {
            font-family: var(--serif);
            font-size: 42px;
            font-weight: 300;
            margin-bottom: 20px;
            color: var(--dark);
        }

        p {
            font-size: 15px;
            line-height: 1.7;
            color: #555;
            margin-bottom: 40px;
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            padding: 18px;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: block;
        }

        /* The Linktree / Discover More Button */
        .btn-discover {
            background: var(--dark);
            color: var(--text-light);
            margin-bottom: 8px; /* Slight gap to separate from socials */
        }

        .btn-discover:hover {
            background: var(--gold);
        }

        .btn-social {
            background: white;
            color: var(--dark);
            border: 1px solid #ddd6cc;
        }

        .btn-social:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .back-home {
            margin-top: 40px;
            display: inline-block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #999;
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }

        .back-home:hover {
            border-bottom-color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Nomadic <span>Alchemy</span></div>
        <h1>Cheers!</h1>
        <p>Your inquiry has been received. Our team will review the details and get back to you with a custom quote within 24 hours.</p>
        
        <div class="links-stack">
            <a href="https://linktr.ee/nomadic.alchemy" target="_blank" class="btn btn-discover">Discover More</a>
            
            <a href="https://www.instagram.com/nomadic.alchemy" target="_blank" class="btn btn-social">Instagram</a>
            <a href="https://www.tiktok.com/@nomadic.alchemy" target="_blank" class="btn btn-social">TikTok</a>
            <a href="https://www.youtube.com/@nomadicalchemy" target="_blank" class="btn btn-social">YouTube</a>
        </div>

        <a href="index.html" class="back-home">Back to Website</a>
    </div>
</body>
</html>
