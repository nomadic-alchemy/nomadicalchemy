<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — Nomadic Alchemy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a96e;
            --dark: #1c1914;
            --cream: #f2ece2;
            --text-light: #f5f0e8;
            --text-dark: #1a1a1a;
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Jost', 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--sans);
            background-color: var(--cream);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            width: 90%;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(201, 169, 110, 0.15);
        }

        .logo {
            font-family: var(--serif);
            font-size: 24px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .logo span {
            color: var(--gold);
            font-style: italic;
        }

        h1 {
            font-family: var(--serif);
            font-size: 42px;
            font-weight: 300;
            margin-bottom: 20px;
            color: var(--dark);
        }

        p {
            font-size: 15px;
            line-height: 1.7;
            color: #555;
            margin-bottom: 40px;
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .btn {
            text-decoration: none;
            padding: 18px;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: block;
        }

        .btn-primary {
            background: var(--dark);
            color: var(--text-light);
        }

        .btn-primary:hover {
            background: var(--gold);
        }

        .social-header {
            font-family: var(--serif);
            font-size: 18px;
            font-style: italic;
            color: var(--dark);
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
        }

        .social-icons a {
            color: var(--dark);
            transition: color 0.3s ease;
            display: inline-block;
        }

        .social-icons a:hover {
            color: var(--gold);
        }

        .social-icons svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .back-home {
            display: inline-block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #999;
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }

        .back-home:hover {
            border-bottom-color: #999;
        }
    </style>
</head>
