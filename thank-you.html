<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — Nomadic Alchemy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a96e;
            --dark: #1c1914;
            --cream: #f2ece2;
            --text-light: #f5f0e8;
            --text-dark: #1a1a1a;
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Jost', 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--sans);
            background-color: var(--cream);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            width: 90%;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(201, 169, 110, 0.15);
        }

        .logo {
            font-family: var(--serif);
            font-size: 24px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .logo span {
            color: var(--gold);
            font-style: italic;
        }

        h1 {
            font-family: var(--serif);
            font-size: 42px;
            font-weight: 300;
            margin-bottom: 20px;
            color: var(--dark);
        }

        p {
            font-size: 15px;
            line-height: 1.7;
            color: #555;
            margin-bottom: 40px;
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 45px;
        }

        .btn {
            text-decoration: none;
            padding: 18px;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: block;
        }

        .btn-primary {
            background: var(--dark);
            color: var(--text-light);
        }

        .btn-primary:hover {
            background: var(--gold);
        }

        .social-header {
            font-family: var(--serif);
            font-size: 18px;
            font-style: italic;
            color: var(--dark);
            margin-bottom: 25px;
            opacity: 0.8;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 35px;
        }

        .social-icons a {
            color: var(--dark);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .social-icons a:hover {
            color: var(--gold);
            transform: translateY(-2px);
        }

        .social-icons svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Fill adjustment for specific icons that look better solid */
        .fill-svg { fill: currentColor; stroke: none !important; }

        .back-home {
            display: inline-block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #999;
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }

        .back-home:hover {
            border-bottom-color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Nomadic <span>Alchemy</span></div>
        <h1>Cheers!</h1>
        <p>Your inquiry has been received. Our team will review the details and get back to you with a custom quote within 24 hours.</p>

            <a href="tel:+254750566305" class="btn btn-primary">Give Us a Call</a>
            <a href="mailto:hello@nomadicalchemy.co.ke" class="btn btn-primary">Send an Email</a>
        </div>

        <div class="social-header">Follow us on our socials</div>
        <div class="social-icons">
            <a href="https://www.instagram.com/nomadic.alchemy" target="_blank">

        <a href="index.html" class="back-home">Back to Website</a>

</body>
</html>
