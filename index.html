*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--gold-light:#e8d5b0;--dark:#1c1914;--dark-2:#231f1a;--dark-3:#2e2922;--cream:#faf7f2;--cream-2:#f2ece2;--text-light:#f5f0e8;--text-muted:#a89880;--text-dark:#1a1a1a;--text-mid:#666;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost','Helvetica Neue',Arial,sans-serif}
html{scroll-behavior:smooth}
body{font-family:var(--serif);color:var(--text-dark);background:#fff;overflow-x:hidden}

nav{display:flex;justify-content:space-between;align-items:center;padding:20px 56px;background:var(--dark);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--dark-3)}
.nav-logo{font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:0.1em;color:var(--text-light)}
.nav-logo span{color:var(--gold);font-style:italic}
.nav-links{display:flex;gap:40px}
.nav-links a{font-family:var(--sans);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;transition:color 0.2s}
.nav-links a:hover{color:var(--gold)}
.nav-cta{font-family:var(--sans);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;background:var(--gold);color:#fff;padding:11px 26px;border:none;cursor:pointer;transition:opacity 0.2s;text-decoration:none;display:inline-block}
.nav-cta:hover{opacity:0.88}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.nav-hamburger span{display:block;width:24px;height:1px;background:var(--text-muted)}
.mobile-menu{display:none;position:absolute;top:100%;left:0;right:0;background:var(--dark);border-top:1px solid var(--dark-3);padding:24px 32px;flex-direction:column;gap:20px;z-index:99}
.mobile-menu.open{display:flex}
.mobile-menu a{font-family:var(--sans);font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);text-decoration:none}

.hero-pretitle{font-family:var(--sans);font-size:11px;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;transform:translateY(10px);opacity:0;animation:fadeInUp 0.8s forwards 0.2s}
.hero-title{font-family:var(--serif);font-size:clamp(48px, 10vw, 92px);font-weight:300;line-height:1;color:var(--text-light);max-width:900px;margin-bottom:32px;transform:translateY(20px);opacity:0;animation:fadeInUp 0.8s forwards 0.4s}
.hero-title span{font-style:italic;color:var(--gold-light)}
.hero-desc{font-family:var(--serif);font-size:clamp(18px, 2.5vw, 22px);font-weight:300;color:var(--text-muted);max-width:560px;margin-bottom:48px;line-height:1.6;transform:translateY(20px);opacity:0;animation:fadeInUp 0.8s forwards 0.6s}
.hero-actions{display:flex;gap:20px;transform:translateY(20px);opacity:0;animation:fadeInUp 0.8s forwards 0.8s}
.btn-primary{font-family:var(--sans);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;background:var(--gold);color:#fff;padding:18px 40px;border:none;cursor:pointer;text-decoration:none;transition:all 0.3s}
.btn-primary:hover{background:var(--gold-light);color:var(--dark)}
.btn-secondary{font-family:var(--sans);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;background:transparent;color:var(--text-light);padding:18px 40px;border:1px solid rgba(255,255,255,0.2);cursor:pointer;text-decoration:none;transition:all 0.3s}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold)}

@keyframes fadeInUp{to{transform:translateY(0);opacity:1}}

@media (max-width: 768px){
nav{padding:16px 24px}
.nav-links, .nav-cta{display:none}
.nav-hamburger{display:flex}
.hero-title{font-size:56px}
.hero-actions{flex-direction:column;width:100%}
.btn-primary, .btn-secondary{width:100%;text-align:center}
}
</style>
</head>
<body>

<nav>
<div class="nav-logo">NOMADIC<span>ALCHEMY</span></div>
<div class="nav-links">
<a href="#services">Services</a>
<a href="#experience">Experience</a>
<a href="#workshops">Workshops</a>
<a href="#contact">Journal</a>
</div>
<a href="booking.html" class="nav-cta">Inquire Now</a>
<button class="nav-hamburger" id="nav-toggle">
<span></span><span></span><span></span>
</button>
<div class="mobile-menu" id="mobile-menu">
<a href="#services">Services</a>
<a href="#experience">Experience</a>
<a href="#workshops">Workshops</a>
<a href="booking.html">Inquire Now</a>
</div>
</nav>

<section class="hero">
<div class="hero-content">
<p class="hero-pretitle">Bespoke Liquid Catering</p>
<h1 class="hero-title">The Art of <span>Refined</span> Mixology</h1>
<p class="hero-desc">Premium mobile bar experiences and artisanal cocktail curation for Nairobi’s most exclusive gatherings.</p>
<div class="hero-actions">
<a href="booking.html" class="btn-primary">Reserve the Bar</a>
<a href="#services" class="btn-secondary">View Services</a>
</div>
</div>
</section>

<script>

const mobileMenu = document.getElementById('mobile-menu');
navToggle.addEventListener('click', () => {
mobileMenu.classList.toggle('open');
});
</script>
