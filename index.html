<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <title>Nomadic Alchemy | Premium Mobile Bar Services Nairobi</title>
    <meta name="description" content="Nomadic Alchemy provides premium mobile bar services, professional mixology, and curated cocktail experiences in Nairobi and Kiambu.">
    
    <meta name="google-site-verification" content="Apib7-x98H0j5cPqHWwSMm6dNU4GmODRoqxLiDzdx9I">

    <style>
        /* Minimalist "Old Money" Aesthetic Styling */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfaf5; /* Cream background */
            color: #1a1a1a; /* Corporate dark text */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
        }
        
        /* Logo Styling */
        .brand-logo {
            width: 120px; /* Adjusted size for better visibility */
            height: auto;
            margin-bottom: 25px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 3px; /* Slightly wider for luxury feel */
            text-transform: uppercase;
            margin-top: 0;
        }
        
        p {
            font-style: italic;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .cta-button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 35px;
            background-color: #1a1a1a;
            color: #fff;
            text-decoration: none;
            border-radius: 1px; /* Sharper edges for a corporate look */
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        
        .cta-button:hover {
            background-color: #333;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="favicon.png" alt="Nomadic Alchemy Logo" class="brand-logo">
        
        <h1>Nomadic Alchemy</h1>
        <p>Premium Mobile Bar & Mixology Services</p>
        
        <a href="booking.html" class="cta-button">Inquire Now</a>
    </div>

</body>
</html>
