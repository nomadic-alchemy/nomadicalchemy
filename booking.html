<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Your Event — Nomadic Alchemy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--dark:#1c1914;--dark-3:#2e2922;--cream-2:#f2ece2;--text-light:#f5f0e8;--text-muted:#a89880;--text-dark:#1a1a1a;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost',sans-serif}
body{font-family:var(--sans);background:var(--cream-2);color:var(--text-dark)}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 56px;background:var(--dark);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--dark-3)}
.nav-logo{font-family:var(--serif);font-size:20px;color:var(--text-light);text-decoration:none;letter-spacing:0.1em}.nav-logo span{color:var(--gold);font-style:italic}
.back-link{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);text-decoration:none}
.page-body{max-width:720px;margin:0 auto;padding:72px 32px 88px}
.page-title{font-family:var(--serif);font-size:48px;font-weight:300;text-align:center;margin-bottom:12px}
.page-sub{font-size:14px;color:#666;text-align:center;margin-bottom:10px}
.required-note{font-size:11px;color:#666;text-align:center;margin-bottom:48px}
.required-note span{color:var(--gold)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.field label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#888}
.field label .req{color:var(--gold);margin-left:2px}
.field input, .field select, .field textarea{padding:13px 16px;font-size:14px;border:1px solid #ddd6cc;background:#fff;outline:none}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--gold)}
.phone-wrap{display:flex}
.phone-code{padding:13px 12px;border:1px solid #ddd6cc;border-right:none;background:#f9f6f1;font-size:14px}
.phone-input{border-left:none!important;flex:1}
/* WhatsApp Button Style */
.whatsapp-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--dark);
    color: var(--gold);
    padding: 20px;
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 14px;
    transition: opacity 0.2s;
}
.whatsapp-btn:hover { opacity: 0.9; }
.budget-display{font-size:15px;font-weight:500;margin-bottom:14px;text-align:center}
.budget-display span{color:var(--gold)}
input[type=range]{width:100%;height:4px;appearance:none;background:#ddd6cc;outline:none;border-radius:2px}
input[type=range]::-webkit-slider-thumb{appearance:none;width:20px;height:20px;background:var(--gold);border-radius:50%;cursor:pointer;border:2px solid #fff}
.budget-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:#aaa}
.submit-btn{width:100%;background:var(--gold);color:#fff;padding:20px;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:0.2em;font-size:11px}
@media(max-width:700px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Nomadic <span>Alchemy</span></a>
  <a href="index.html" class="back-link">Back to Home</a>
</nav>

<div class="page-body">
  <h1 class="page-title">Let's make it happen</h1>
  <p class="page-sub">Tell us about your event and we'll get back within 24 hours with a custom quote.</p>
  <p class="required-note">Fields marked <span>*</span> are required</p>

  <form action="https://api.web3forms.com/submit" method="POST">
    <input type="hidden" name="access_key" value="9837f6a8-35b7-4565-80e7-746e106ca202">
    <input type="hidden" name="redirect" value="https://nomadicalchemy.co.ke/thank-you.html">

    <div class="form-row">
      <div class="field">
        <label>Your Name <span class="req">*</span></label>
        <input type="text" name="name" id="name" placeholder="Jose Cuervo" required />
      </div>
      <div class="field">
        <label>Phone / WhatsApp <span class="req">*</span></label>
        <div class="phone-wrap">
          <div class="phone-code">+</div>
          <input class="phone-input" type="tel" name="phone" id="phone" value="254 " required />
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label>Event Type</label>
        <select name="event_type" id="event_type">
          <option value="">Select event type</option>
          <option>Wedding / Reception</option>
          <option>Corporate Event</option>
          <option>Private Party</option>
        </select>
      </div>
      <div class="field">
        <label>Event Date <span class="req">*</span></label>
        <input type="date" name="event_date" id="event_date" onclick="this.showPicker()" required />
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label>Expected Guests <span class="req">*</span></label>
        <input type="number" name="guests" id="guests" placeholder="80" required />
      </div>
      <div class="field">
        <label>Venue / Location <span class="req">*</span></label>
        <input type="text" name="venue" id="venue" placeholder="Karen, Nairobi" required />
      </div>
    </div>

    <div class="field">
      <label>Approximate Budget</label>
      <div class="budget-display">KES <span id="budgetVal">49,500</span></div>
      <input type="range" id="budgetSlider" name="budget_range" min="49500" max="1000000" value="49500" step="500" />
      <div class="budget-labels"><span>KES 49,500</span><span>KES 1,000,000</span></div>
      <input type="hidden" name="budget" id="budgetHidden" value="KES 49,500" />
    </div>

    <div class="field">
      <label>Tell Us More</label>
      <textarea name="message" id="message" placeholder="Vibe, theme, any specific drinks in mind..."></textarea>
    </div>

    <button type="submit" class="submit-btn">Send Enquiry</button>

    <a href="#" class="whatsapp-btn" onclick="sendWhatsApp(event)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#25D366"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766 0-3.18-2.589-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.982-.363-1.747-.756-2.879-2.506-2.966-2.62-.088-.114-.719-.951-.719-1.811 0-.86.444-1.286.605-1.441.162-.155.361-.193.477-.193h.346c.108 0 .252-.04.397.303l.542 1.308c.063.153.103.33.004.522-.099.193-.148.313-.297.485-.148.173-.311.385-.444.516-.148.148-.302.309-.129.605.171.297.762 1.256 1.634 2.033.73.652 1.332.854 1.634.996.302.144.477.121.652-.079.175-.197.756-.879.954-1.178.2-.297.397-.252.671-.153l1.707.809c.274.135.459.198.527.313.067.121.067.7-.077 1.105z"/></svg>
      Inquire Instantly
    </a>
  </form>
</div>

<script>
// Budget Slider Logic
const slider = document.getElementById('budgetSlider');
const display = document.getElementById('budgetVal');
const hidden = document.getElementById('budgetHidden');
slider.addEventListener('input', function(){
  display.textContent = Number(this.value).toLocaleString();
  hidden.value = 'KES ' + Number(this.value).toLocaleString();
});

// WhatsApp Logic
function sendWhatsApp(e) {
    e.preventDefault();
    const name = document.getElementById('name').value || "[Name]";
    const type = document.getElementById('event_type').value || "[Type]";
    const guests = document.getElementById('guests').value || "[Number]";
    const loc = document.getElementById('venue').value || "[Location]";
    const msg = document.getElementById('message').value || "[Details]";

    const text = `Hello Nomadic Alchemy! I’d like to enquire about a booking.%0A%0ABelow are the details:%0A%0AName: ${name}%0AEvent type: ${type}%0AExpected guests: ${guests}%0ALocation: ${loc}%0AMore about the function: ${msg}%0A%0AEngage me for further info & a quote.`;
    window.open(`https://wa.me/254750566305?text=${text}`, '_blank');
}
</script>
</body>
</html>
