<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Your Event — Nomadic Alchemy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--gold-light:#e8d5b0;--dark:#1c1914;--dark-3:#2e2922;--cream-2:#f2ece2;--text-light:#f5f0e8;--text-muted:#a89880;--text-dark:#1a1a1a;--text-mid:#666;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost','Helvetica Neue',Arial,sans-serif}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--cream-2);color:var(--text-dark)}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 56px;background:var(--dark);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--dark-3)}
.nav-logo{font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:0.1em;color:var(--text-light);text-decoration:none}
.nav-logo span{color:var(--gold);font-style:italic}
.back-link{font-family:var(--sans);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;transition:color 0.2s}
.back-link:hover{color:var(--gold)}
.page-body{max-width:720px;margin:0 auto;padding:72px 32px 88px}
.page-title{font-family:var(--serif);font-size:48px;font-weight:300;color:var(--text-dark);text-align:center;margin-bottom:12px}
.page-sub{font-family:var(--sans);font-size:14px;color:var(--text-mid);text-align:center;line-height:1.75;margin-bottom:10px}
.submit-btn{width:100%;background:var(--gold);color:#fff;font-family:var(--sans);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;padding:17px;border:none;cursor:pointer;transition:opacity 0.2s;margin-top:20px;display:block;text-align:center;text-decoration:none}
.submit-btn:hover{opacity:0.88}
.gold-divider{height:1px;background:var(--gold);opacity:0.15;margin:40px 0}
.alt-contact{text-align:center;font-family:var(--sans);font-size:13px;color:var(--text-mid)}
.alt-contact a{color:var(--gold);text-decoration:none}
@media(max-width:700px){nav{padding:18px 24px}.page-body{padding:48px 24px 72px}.page-title{font-size:36px}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Nomadic <span>Alchemy</span></a>
  <a href="index.html" class="back-link">Back to home</a>
</nav>

<div class="page-body">
  <h1 class="page-title">Let's make it happen</h1>
  <p class="page-sub">Click the button below to enquire via WhatsApp. A message template will be ready for you to fill in and send.</p>

  <a href="https://wa.me/254750566305?text=Hi%20Nomadic%20Alchemy!%20I'd%20like%20to%20enquire%20about%20a%20booking.%0A%0APlease%20fill%20in%20your%20details%20below:%0A-%20Your%20Name:%20%0A-%20Event%20Type:%20%0A-%20Expected%20Guests:%20%0A-%20Venue%20/%20Location:%20%0A-%20Tell%20us%20more%20about%20your%20function:%20" 
     class="submit-btn" 
     onclick="handleInquiry()">
    Inquire via WhatsApp
  </a>

  <p style="text-align:center; font-size:13px; color:#aaa; margin-top:12px;">Tap WhatsApp and press send to start your booking request.</p>

  <div class="gold-divider"></div>
  <div class="alt-contact">
    Prefer email? <a href="mailto:bookings@nomadicalchemy.co.ke">bookings@nomadicalchemy.co.ke</a>
  </div>
</div>

<script>
function handleInquiry() {
  // Wait 1.5 seconds to ensure WhatsApp opens, then redirect home
  setTimeout(function() {
    window.location.href = "https://nomadicalchemy.co.ke/index.html";
  }, 1500);
}
</script>
</body>
</html>
