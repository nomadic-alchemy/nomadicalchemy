<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Your Event — Nomadic Alchemy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a96e;--gold-light:#e8d5b0;--dark:#1c1914;--dark-3:#2e2922;--cream-2:#f2ece2;--text-light:#f5f0e8;--text-muted:#a89880;--text-dark:#1a1a1a;--text-mid:#666;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost','Helvetica Neue',Arial,sans-serif}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--cream-2);color:var(--text-dark)}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 56px;background:var(--dark);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--dark-3)}
.nav-logo{font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:0.1em;color:var(--text-light);text-decoration:none}
.nav-logo span{color:var(--gold);font-style:italic}
.back-link{font-family:var(--sans);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;transition:color 0.2s}
.back-link:hover{color:var(--gold)}
.page-body{max-width:720px;margin:0 auto;padding:72px 32px 88px}
.page-title{font-family:var(--serif);font-size:48px;font-weight:300;color:var(--text-dark);text-align:center;margin-bottom:12px}
.page-sub{font-family:var(--sans);font-size:14px;color:var(--text-mid);text-align:center;line-height:1.75;margin-bottom:10px}
.required-note{font-family:var(--sans);font-size:11px;color:var(--text-mid);text-align:center;margin-bottom:48px;letter-spacing:0.04em}
.required-note span{color:var(--gold)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.field label{font-family:var(--sans);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#888}
.field label .req{color:var(--gold);margin-left:2px}
.phone-wrap{display:flex}
.phone-code{padding:13px 12px;font-size:14px;font-family:var(--sans);border:1px solid #ddd6cc;border-right:none;background:#f9f6f1;color:var(--text-dark);white-space:nowrap;display:flex;align-items:center;cursor:text}
.field input,.field select,.field textarea{padding:13px 16px;font-size:14px;font-family:var(--sans);border:1px solid #ddd6cc;background:#fff;color:var(--text-dark);outline:none;transition:border-color 0.2s;appearance:none;width:100%;cursor:pointer}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.phone-input{border-left:none!important;flex:1;cursor:text!important}
.field textarea{height:110px;resize:vertical;cursor:text}
.budget-display{font-family:var(--sans);font-size:15px;color:var(--text-dark);font-weight:500;margin-bottom:14px;text-align:center}
.budget-display span{color:var(--gold)}
input[type=range]{width:100%;height:4px;background:linear-gradient(to right,var(--gold) 0%,var(--gold) 2%,#ddd6cc 2%,#ddd6cc 100%);border:none;outline:none;cursor:pointer;appearance:none;border-radius:2px;padding:0}
input[type=range]::-webkit-slider-thumb{appearance:none;width:20px;height:20px;background:var(--gold);border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.budget-labels{display:flex;justify-content:space-between;margin-top:6px;font-family:var(--sans);font-size:10px;color:#aaa;letter-spacing:0.06em}
.submit-btn{width:100%;background:var(--gold);color:#fff;font-family:var(--sans);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;padding:20px;border:none;cursor:pointer;transition:opacity 0.2s;display:block;text-align:center;text-decoration:none}
.submit-btn:hover{opacity:0.88}
.gold-divider{height:1px;background:var(--gold);opacity:0.15;margin:40px 0}
@media(max-width:700px){nav{padding:18px 24px}.page-body{padding:48px 24px 72px}.form-row{grid-template-columns:1fr}.page-title{font-size:36px}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Nomadic <span>Alchemy</span></a>
  <a href="index.html" class="back-link">Back to home</a>
</nav>

<div class="page-body">
  <h1 class="page-title">Let's make it happen</h1>
  <p class="page-sub">Tell us about your event and we'll get back within 24 hours with a custom quote.</p>
  <p class="required-note">Fields marked <span>*</span> are required</p>

  <form action="https://api.web3forms.com/submit" method="POST">
    <input type="hidden" name="access_key" value="9837f6a8-35b7-4565-80e7-746e106ca202">
    <input type="hidden" name="redirect" value="https://nomadicalchemy.co.ke/thank-you.html">
    <input type="hidden" name="subject" value="New event enquiry — Nomadic Alchemy">

    <div class="form-row">
      <div class="field">
        <label>Your name <span class="req">*</span></label>
        <input type="text" name="name" placeholder="Jose Cuervo" required />
      </div>
      <div class="field">
        <label>Phone / WhatsApp <span class="req">*</span></label>
        <div class="phone-wrap">
          <div class="phone-code">+</div>
          <input class="phone-input" type="tel" name="phone" placeholder="254 7XX XXX XXX" required pattern="[0-9\s]{9,15}" value="254 " />
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label>Event type</label>
        <select name="event_type">
          <option value="">Select event type</option>
          <option>Wedding / reception</option>
          <option>Corporate event</option>
          <option>Private party</option>
          <option>Birthday</option>
          <option>Mixology workshop</option>
          <option>Menu consulting</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Event date <span class="req">*</span></label>
        <input type="date" name="event_date" required />
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label>Expected guests <span class="req">*</span></label>
        <input type="number" name="guests" placeholder="80" min="1" required />
      </div>
      <div class="field">
        <label>Venue / location <span class="req">*</span></label>
        <input type="text" name="venue" placeholder="Karen, Nairobi" required />
      </div>
    </div>

    <div class="field">
      <label>Approximate budget</label>
      <div class="budget-wrap">
        <div class="budget-display">KES <span id="budgetVal">49,500</span></div>
        <input type="range" id="budgetSlider" name="budget_range" min="49500" max="1000000" value="49500" step="500" />
        <div class="budget-labels"><span>KES 49,500</span><span>KES 1,000,000</span></div>
        <input type="hidden" name="budget" id="budgetHidden" value="KES 49,500" />
      </div>
    </div>

    <div class="field">
      <label>Tell us more</label>
      <textarea name="message" placeholder="Vibe, theme, any specific drinks in mind..."></textarea>
    </div>

    <button type="submit" class="submit-btn">Send enquiry</button>
  </form>

  <div class="gold-divider"></div>
</div>

<script>
const slider = document.getElementById('budgetSlider');
const display = document.getElementById('budgetVal');
const hidden = document.getElementById('budgetHidden');

slider.addEventListener('input', function(){
  const val = this.value;
  const min = 49500, max = 1000000;
  const pct = ((val - min) / (max - min)) * 100;
  slider.style.background = `linear-gradient(to right, #c9a96e 0%, #c9a96e ${pct}%, #ddd6cc ${pct}%, #ddd6cc 100%)`;
  display.textContent = Number(val).toLocaleString();
  hidden.value = 'KES ' + Number(val).toLocaleString();
});
</script>
</body>
</html>
